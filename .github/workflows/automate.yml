name: Automated University Pipeline

on:
  schedule:
    - cron: '0 1,13,16,19,22 * * *' # Run at 08:00, 20:00, 23:00, 02:00, 05:00 WIB
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Create credentials files
        run: |
          echo "${{ secrets.GDRIVE_CREDENTIALS }}" > credentials.json
          echo "${{ secrets.GDRIVE_TOKEN }}" > token.json
          echo "${{ secrets.TICKTICK_TOKEN }}" > ticktick_token.json

      - name: Run automation
        env:
          EDLINK_EMAIL: ${{ secrets.EDLINK_EMAIL }}
          EDLINK_PASSWORD: ${{ secrets.EDLINK_PASSWORD }}
          TICKTICK_CLIENT_ID: ${{ secrets.TICKTICK_CLIENT_ID }}
          TICKTICK_CLIENT_SECRET: ${{ secrets.TICKTICK_CLIENT_SECRET }}
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
        run: python main.py --run

      - name: Save state and Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-debug-data
          path: |
            data/state.json
            data/*.png
